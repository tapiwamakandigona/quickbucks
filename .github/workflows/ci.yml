name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  domain:
    name: Domain engine — analyze, format, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/quickbucks_domain
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: dart analyze --fatal-infos
      - run: dart test

  app:
    name: App — analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
